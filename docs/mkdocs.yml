site_name: SpaceLiDAR.jl
repo_url: https://github.com/evetion/SpaceLiDAR.jl
site_description: SpaceLiDAR.jl
site_author: Maarten Pronk
site_url: https://www.evetion.nl/SpaceLiDAR.jl/

extra_css:
  - assets/Documenter.css
  - css/earth.css

extra_javascript:
  - https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.1/MathJax.js?config=TeX-AMS_HTML
  - assets/mathjaxhelper.js

docs_dir: "build"

nav:
  - Home: "index.md"
  - Tutorials:
      - "Installation": "tutorial/installation.md"
      - "Usage": "tutorial/usage.md"
  - Guides:
      - "Downloading": "guides/downloads.md"
      - "Track filtering": "guides/tracks.md"
      - "Selecting variables": "guides/variables.md"
      - "Adding a product": "guides/new-schema.md"
      - "Migration (points → table)": "guides/migration.md"
  - Topics:
      - "HDF5": "topics/HDF5.md"
      - "Granules": "topics/granules.md"
      - "Search": "topics/search.md"
  - ICESat:
      - "Overview": "topics/ICESat.md"
      - "GLAH06": "topics/icesat/GLAH06.md"
      - "GLAH14": "topics/icesat/GLAH14.md"
  - ICESat-2:
      - "Overview": "topics/ICESat-2.md"
      - "ATL03": "topics/icesat2/ATL03.md"
      - "ATL06": "topics/icesat2/ATL06.md"
      - "ATL08": "topics/icesat2/ATL08.md"
      - "ATL12": "topics/icesat2/ATL12.md"
  - GEDI:
      - "Overview": "topics/GEDI.md"
      - "L2A": "topics/gedi/L2A.md"
  - Reference:
      - "Search": "reference/search.md"
      - "Granules": "reference/granules.md"
      - "Data": "reference/data.md"
      - "Utilities": "reference/utilities.md"
      - "Index": "reference/api.md"
  - Contributing: "CONTRIBUTING.md"
  - Changelog: "changelog.md"

theme:
  name: material
  icon:
    logo: material/satellite-variant
  font:
    # text: Source Sans Pro
    code: Fira Mono
  favicon: img/favicon.svg
  language: en
  custom_dir: overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: lime
      accent: deep orange
      toggle:
        icon: material/lightbulb-outline
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: lime
      accent: deep orange
      toggle:
        icon: material/lightbulb
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow
    - toc.integrate
    - announce.dismiss
    - search.suggest
    - search.highlight
plugins:
  - search
  - autorefs
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - tables
  - mdx_math
  - admonition
  - footnotes
  - toc:
      permalink: true
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:materialx.emoji.twemoji
      emoji_generator: !!python/name:materialx.emoji.to_svg
edit_uri: edit/master/docs/
repo_name: evetion/SpaceLiDAR.jl
extra:
  version:
    provider: mike
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/evetion/SpaceLiDAR.jl
      name: Source code
    - icon: fontawesome/brands/mastodon
      link: https://fosstodon.org/@evetion
      name: Mastodon
copyright: Copyright &copy; 2026 Maarten Pronk, Deltares | Delft University of Technology
